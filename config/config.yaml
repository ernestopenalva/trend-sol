symbol: SOLUSDT
active_profile: intraday
position_mode: bot_exit_only
strategy_version: "b_atr_v1.3"

fees:
  enabled: true
  maker_fee_pct: 0.10
  taker_fee_pct: 0.10
  use_bnb_discount: false

run_control:
  mode: continuous
  stop_after_cycle_complete: false

market_data:
  rest_url: "https://api.binance.com"
  ws_url: "wss://stream.binance.com:9443"
  ws_ping_interval_seconds: 180
  ws_ping_timeout_seconds: 30
  trade_stream: "solusdt@aggTrade"
  max_market_data_age_seconds: 60
  kline_streams:
    - "solusdt@kline_4h"
    - "solusdt@kline_1d"
  historical_klines_limit:
    "1m": 300
    "15m": 300
    "4h": 120
    "1d": 80

execution:
  testnet_url: "https://testnet.binance.vision"
  recv_window_ms: 5000
  use_server_time_sync: true
  http_timeout_seconds: 8

trend:
  timeframe: "1d"
  ema_period: 50
  ema_slope_lookback: 3

entry:
  timeframe: "4h"
  lookback_candles: 30
  atr_period: 14
  pullback_atr_multiplier: 1.5
  rsi_period: 14
  rsi_threshold: 45
  rsi_lookback_candles: 2
  volume_ma_candles: 5
  require_volume_drying: true
  require_reversal_candle_closed: true
  near_miss:
    trend_slope_ratio: 0.002
    pullback_required_ratio: 0.85
    rsi_margin: 3
    reversal_min_position: 0.58
  max_entries_per_candle: 1
  entry_spacing_atr: 1.0

profiles:
  production:
    trend:
      timeframe: "1d"
    entry:
      timeframe: "4h"
      pullback_atr_multiplier: 1.5
      rsi_threshold: 45
      rsi_lookback_candles: 2
      require_volume_drying: true
      require_reversal_candle_closed: true
  intraday:
    trend:
      timeframe: "15m"
    entry:
      timeframe: "1m"
      pullback_atr_multiplier: 0.8
      rsi_threshold: 55
      rsi_lookback_candles: 1
      require_volume_drying: false
      require_reversal_candle_closed: true

capital:
  operational_balance_usdt: 100
  trade_size_pct: 20
  max_open_positions: 5

exit_server_simple_trail:
  preferred_order_type: "STOP_LOSS"
  fallback_order_type: "STOP_LOSS_LIMIT"
  trailing_delta_bips: 100
  use_stop_price: false

exit_bot_full_engine:
  stop_loss_pct: 30
  breakeven:
    - trigger_pct: 5
      stop_to_pct: 1
    - trigger_pct: 6
      stop_to_pct: 3
    - trigger_pct: 10
      stop_to_pct: 5
  trailing:
    activation_pct: 10
    gap_pct: 4

risk:
  # ATR da saida e congelado no momento da entrada.
  # BE, profit lock e trailing usam entry_atr, nao ATR recalculado ao vivo.
  hard_stop:
    enabled: true
    stop_pct: 2.0
  review_stop_pct: 30
  breakeven:
    mode: atr
    trigger_atr: 3
    offset_atr: 0.1
  profit_lock:
    mode: atr
    net_floor_shadow:
      enabled: true
      net_margin_pct: 0.05
      activation_buffer_atr: 0.5
    steps:
      - trigger_atr: 5
        lock_atr: 1.5
      - trigger_atr: 8
        lock_atr: 3
      - trigger_atr: 12
        lock_atr: 6
  trailing:
    mode: atr
    activation_atr: 10
    gap_atr: 5

ladder:
  be_net_margin_pct: 0.05
  be_activation_buffer_atr: 0.5

cycle:
  pairs_per_cycle: 1
  trades_per_cycle: 1
  prolabore_pct: 5
  stats_min_pairs: 50

logging:
  level: INFO
  console: true
  trade_log: "logs/trades.jsonl"
  decision_log: "logs/decisions.jsonl"
  system_log: "logs/system.log"

instrumentation:
  enabled: true
  queue_max_size: 10000
  cohort_guard_study:
    episode_gap_hours: 6
    rules:
      - name: SENSITIVE
        min_open_positions: 3
        underwater_ratio: 0.66
        oldest_age_minutes: 60
        below_average_entry_atr: 0.5
      - name: BASE
        min_open_positions: 3
        underwater_ratio: 0.75
        oldest_age_minutes: 120
        below_average_entry_atr: 1.0
      - name: SELECTIVE
        min_open_positions: 3
        underwater_ratio: 1.0
        oldest_age_minutes: 240
        below_average_entry_atr: 2.0
  phantoms:
    enabled: true
    max_open_positions: 5
    max_age_hours: 72
  trough_events_file: "data/telemetry/trough_events.jsonl"
  position_snapshots_file: "data/telemetry/position_snapshots.jsonl"
  rejected_signals_file: "data/telemetry/rejected_signals.jsonl"

console:
  mode: human
  interval_seconds: 60
  show_price_status: false
  show_raw_status: false
