symbol: SOLUSDT
active_profile: debug_intraday

run_control:
  mode: single_cycle
  stop_after_cycle_complete: true

market_data:
  rest_url: "https://api.binance.com"
  ws_url: "wss://stream.binance.com:9443"
  ws_ping_interval_seconds: 180
  ws_ping_timeout_seconds: 30
  trade_stream: "solusdt@aggTrade"
  max_market_data_age_seconds: 60
  kline_streams:
    - "solusdt@kline_4h"
    - "solusdt@kline_1d"
  historical_klines_limit:
    "1m": 300
    "15m": 300
    "4h": 120
    "1d": 80

execution:
  testnet_url: "https://testnet.binance.vision"
  recv_window_ms: 5000
  use_server_time_sync: true
  http_timeout_seconds: 8

trend:
  timeframe: "1d"
  ema_period: 50
  ema_slope_lookback: 3

entry:
  timeframe: "4h"
  lookback_candles: 30
  atr_period: 14
  pullback_atr_multiplier: 1.5
  rsi_period: 14
  rsi_threshold: 45
  rsi_lookback_candles: 2
  volume_ma_candles: 5
  require_volume_drying: true
  require_reversal_candle_closed: true
  near_miss:
    trend_slope_ratio: 0.002
    pullback_required_ratio: 0.85
    rsi_margin: 3
    reversal_min_position: 0.58

profiles:
  production:
    trend:
      timeframe: "1d"
    entry:
      timeframe: "4h"
      pullback_atr_multiplier: 1.5
      rsi_threshold: 45
      rsi_lookback_candles: 2
      require_volume_drying: true
      require_reversal_candle_closed: true
  debug_intraday:
    trend:
      timeframe: "15m"
    entry:
      timeframe: "1m"
      pullback_atr_multiplier: 0.8
      rsi_threshold: 55
      rsi_lookback_candles: 1
      require_volume_drying: false
      require_reversal_candle_closed: true

capital:
  operational_balance_usdt: 1000
  trade_size_pct: 5
  max_open_pairs: 1

exit_server_simple_trail:
  preferred_order_type: "STOP_LOSS"
  fallback_order_type: "STOP_LOSS_LIMIT"
  trailing_delta_bips: 400
  use_stop_price: false

exit_bot_full_engine:
  stop_loss_pct: 30
  breakeven:
    - trigger_pct: 5
      stop_to_pct: 1
    - trigger_pct: 6
      stop_to_pct: 3
    - trigger_pct: 10
      stop_to_pct: 5
  trailing:
    activation_pct: 10
    gap_pct: 4

risk:
  review_stop_pct: 30
  profit_lock_mode: atr
  profit_lock_atr:
    - trigger_atr: 3
      lock_atr: 0.5
    - trigger_atr: 5
      lock_atr: 1.5
    - trigger_atr: 8
      lock_atr: 3
  trailing:
    mode: atr
    activation_atr: 5
    gap_atr: 3

cycle:
  pairs_per_cycle: 1
  trades_per_cycle: 1
  prolabore_pct: 5
  stats_min_pairs: 50

logging:
  level: INFO
  console: true
  trade_log: "logs/trades.jsonl"
  decision_log: "logs/decisions.jsonl"
  system_log: "logs/system.log"

console:
  mode: human
  interval_seconds: 60
  show_price_status: false
  show_raw_status: false
